<!DOCTYPE html>
<html>
<head>
  <title>Daksh Portfolio</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial;
      scroll-behavior: smooth;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
    }

    /* NAVBAR */
    nav {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      background: rgba(0,0,0,0.5);
      position: sticky;
      top: 0;
      backdrop-filter: blur(10px);
    }

    nav h1 {
      color: #38bdf8;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      transition: 0.3s;
    }

    nav a:hover {
      color: #38bdf8;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 100px 20px;
      animation: fadeIn 2s ease;
    }

    .hero h2 {
      font-size: 45px;
      color: #38bdf8;
    }

    .hero p {
      margin-top: 10px;
      font-size: 18px;
    }

    /* SECTIONS */
    .section {
      padding: 60px 20px;
      text-align: center;
    }

    .section h2 {
      margin-bottom: 20px;
      color: #38bdf8;
    }

    /* PROJECT CARDS */
    .projects {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background: #1e293b;
      margin: 20px;
      padding: 20px;
      width: 280px;
      border-radius: 15px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.03);
      box-shadow: 0 10px 30px rgba(56,189,248,0.3);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      background: #38bdf8;
      color: black;
      border-radius: 8px;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
    }

    /* CONTACT FORM */
    form {
      max-width: 400px;
      margin: auto;
      display: flex;
      flex-direction: column;
    }

    input, textarea {
      margin: 10px 0;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px;
      background: #38bdf8;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: white;
    }

    /* ANIMATION */
    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav>
    <h1>Daksh</h1>
    <div>
      <a href="#">Home</a>
      <a href="#projects">Projects</a>
      <a href="#contact">Contact</a>
    </div>
  </nav>

  <!-- HERO -->
  <div class="hero">
    <h2>Hello, I’m Daksh 👋</h2>
    <p>Future AI Developer 🚀</p>
  </div>

  <!-- PROJECTS -->
  <div class="section" id="projects">
    <h2>My Projects</h2>

    <div class="projects">

      <div class="card">
        <img src="https://via.placeholder.com/300">
        <h3>My First Website</h3>
        <p>My personal portfolio built with HTML & CSS.</p>
        <a href="#" class="btn">View</a>
      </div>

      <div class="card">
        <img src="https://via.placeholder.com/300">
        <h3>Coming Soon</h3>
        <p>More projects will be added here.</p>
        <a href="#" class="btn">View</a>
      </div>

    </div>
  </div>

  <!-- CONTACT -->
  <div class="section" id="contact">
    <h2>Contact Me</h2>

    <form>
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Your Email" required>
      <textarea placeholder="Your Message"></textarea>
      <button type="submit">Send</button>
    </form>
  </div>

</body>
</html>

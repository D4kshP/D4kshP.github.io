<!DOCTYPE html>
<html>
<head>
  <title>Daksh Portfolio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial;
    }

    body {
      background: #0f172a;
      color: white;
    }

    /* Navbar */
    nav {
      display: flex;
      justify-content: space-between;
      padding: 20px;
      background: #020617;
    }

    nav h1 {
      color: #38bdf8;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
    }

    /* Hero */
    .hero {
      text-align: center;
      padding: 80px 20px;
    }

    .hero h2 {
      font-size: 40px;
      color: #38bdf8;
    }

    /* Sections */
    .section {
      padding: 40px;
      text-align: center;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      border-radius: 10px;
    }

  </style>
</head>
<body>

  <!-- Navbar -->
  <nav>
    <h1>Daksh</h1>
    <div>
      <a href="#">Home</a>
      <a href="#">Projects</a>
      <a href="#">Contact</a>
    </div>
  </nav>

  <!-- Hero -->
  <div class="hero">
    <h2>Hello, I’m Daksh 👋</h2>
    <p>Future AI Developer 🚀</p>
  </div>

  <!-- About -->
  <div class="section">
    <h2>About Me</h2>
    <div class="card">
      <p>I’m learning coding and building cool websites.</p>
    </div>
  </div>

  <!-- Projects -->
  <div class="section">
    <h2>Projects</h2>
    <div class="card">
      <p>Coming soon...</p>
    </div>
  </div>

</body>
</html>

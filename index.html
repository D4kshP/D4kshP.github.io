<!DOCTYPE html>
<html>
<head>
  <title>Daksh Portfolio</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: black;
      color: white;
      overflow: hidden;
    }

    /* STAR BACKGROUND */
    body::before {
      content: "";
      position: fixed;
      width: 100%;
      height: 100%;
      background: url("https://www.transparenttextures.com/patterns/stardust.png");
      opacity: 0.3;
      z-index: -1;
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .hero h1 {
      font-size: 70px;
      font-weight: 600;
      background: linear-gradient(90deg, #a855f7, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero h2 {
      font-size: 28px;
      margin-top: 15px;
      color: #c084fc;
    }

    .hero p {
      margin-top: 20px;
      max-width: 600px;
      color: #aaa;
      font-size: 16px;
    }

    /* TYPEWRITER CURSOR */
    #typing::after {
      content: "|";
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* BUTTONS */
    .buttons {
      margin-top: 30px;
    }

    .btn {
      padding: 12px 25px;
      margin: 10px;
      border-radius: 30px;
      text-decoration: none;
      color: white;
      border: 1px solid #a855f7;
      transition: 0.3s;
    }

    .btn:hover {
      background: linear-gradient(90deg, #a855f7, #6366f1);
      box-shadow: 0 0 20px #a855f7;
      transform: scale(1.05);
    }

  </style>
</head>

<body>

  <div class="hero">
    <h1>Daksh Pradhwani</h1>

    <h2>
      I am a <span id="typing"></span>
    </h2>

    <p>
      A passionate future AI developer from India, building cool things with code and creativity.
    </p>

    <div class="buttons">
      <a href="#" class="btn">View Projects</a>
      <a href="#" class="btn">Contact Me</a>
    </div>
  </div>

  <!-- TYPEWRITER SCRIPT -->
  <script>
    const roles = [
      "AI Developer",
      "Lead Guitarist 🎸",
      "Avid Reader 📚",
      "Future Innovator 🚀",
      "Tech Explorer 💻"
    ];

    let index = 0;
    let charIndex = 0;
    let currentText = "";
    let isDeleting = false;

    function type() {
      let fullText = roles[index];

      if (isDeleting) {
        currentText = fullText.substring(0, charIndex--);
      } else {
        currentText = fullText.substring(0, charIndex++);
      }

      document.getElementById("typing").textContent = currentText;

      let speed = isDeleting ? 50 : 100;

      if (!isDeleting && charIndex === fullText.length) {
        isDeleting = true;
        speed = 1200; // pause before deleting
      } else if (isDeleting && charIndex === 0) {
        isDeleting = false;
        index = (index + 1) % roles.length;
        speed = 400;
      }

      setTimeout(type, speed);
    }

    type();
  </script>

</body>
</html>
